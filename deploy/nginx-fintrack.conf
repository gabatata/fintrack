## Nginx config para FinTrack
## Salvar em: /etc/nginx/sites-available/fintrack
## Substituir SEU_DOMINIO pelo seu dominio ou IP do servidor

server {
    listen 80;
    server_name SEU_DOMINIO;

    # Redireciona HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO;

    # Certificado SSL (gerado pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy para o Streamlit
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Headers obrigatorios para Streamlit funcionar
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts maiores (necessario para WebSocket do Streamlit)
        proxy_read_timeout 86400;
    }

    # Endpoint de health check
    location /_health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
